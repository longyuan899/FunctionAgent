<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>工具集 — 智能任务代理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#f0f6fc;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(240,246,252,0.1)}
.header h1{font-size:1rem;font-weight:700}
.nav{display:flex;gap:8px}
.nav a{padding:7px 16px;border-radius:8px;border:1px solid rgba(240,246,252,0.1);background:rgba(255,255,255,0.03);color:#8b949e;font-size:0.88rem;text-decoration:none}
.nav a.active{background:#238636;border-color:#238636;color:#fff}
.container{max-width:1000px;margin:0 auto;padding:32px 24px}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.page-desc{color:#8b949e;font-size:0.95rem;margin-bottom:32px}
.cat-title{font-size:1.1rem;font-weight:700;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(240,246,252,0.08);display:flex;align-items:center;gap:8px}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;margin-bottom:8px}
.tool-card{background:rgba(255,255,255,0.03);border:1px solid rgba(240,246,252,0.08);border-radius:14px;padding:20px 22px;transition:all 0.2s}
.tool-card:hover{border-color:rgba(88,166,255,0.3);background:rgba(88,166,255,0.03)}
.tool-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tool-name{font-weight:700;color:#58a6ff;font-size:1rem}
.tool-badge{padding:2px 8px;border-radius:12px;font-size:0.72rem;background:rgba(88,166,255,0.1);color:#58a6ff;border:1px solid rgba(88,166,255,0.2)}
.tool-desc{font-size:0.88rem;color:#8b949e;line-height:1.6;margin-bottom:12px}
.tool-params-title{font-size:0.8rem;font-weight:600;color:rgba(240,246,252,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.param-list{display:flex;flex-direction:column;gap:5px}
.param-item{display:flex;align-items:baseline;gap:8px;font-size:0.82rem;font-family:monospace}
.param-name{color:#a371f7;font-weight:600}
.param-type{color:#58a6ff;background:rgba(88,166,255,0.08);padding:1px 6px;border-radius:4px;font-size:0.75rem}
.param-required{color:#f85149;font-size:0.72rem}
.param-desc{color:#8b949e;font-family:-apple-system,sans-serif;font-size:0.82rem}
.loading{text-align:center;padding:60px;color:#8b949e}
</style>
</head>
<body>
<div class="header">
<h1>🤖 智能任务代理</h1>
<div class="nav">
<a href="/">首页</a><a href="/chat">AI对话</a><a href="/tools" class="active">工具集</a><a href="/history">历史</a>
</div>
</div>
<div class="container">
<div class="page-title">🛠️ 可用工具集</div>
<div class="page-desc">Agent 智能代理已注册的 Function Calling 工具，点击卡片可查看参数说明</div>
<div id="toolList"><div class="loading">加载中...</div></div>
</div>
<script>
async function loadTools(){
  try{
    const r=await fetch("/api/tools");
    const d=await r.json();
    const cats={"calendar":"📅 日历管理","search":"🌐 搜索与信息","database":"🗄️ 数据库操作","meeting_room":"🏢 会议室","general":"🔧 通用工具"};
    let html="";
    const byCat={};
    (d.tools||[]).forEach(t=>{
      const cat=t.function?.description?.match(/\[\w+\]/)?.[0]||"general";
      const name=t.function?.name||"";
      const desc=t.function?.description||"";
      const params=t.function?.parameters?.properties||{};
      const required=t.function?.parameters?.required||[];
      byCat.setdefault=byCat.setdefault||{};
      if(!byCat.setdefault[cat])byCat.setdefault[cat]=[];
      byCat.setdefault[cat].push({name,desc,params,required});
    });
    Object.entries(byCat.setdefault||{}).forEach(([cat,tools])=>{
      html+=`<div class="cat-title">${cats[cat]||cat}</div><div class="tool-grid">`;
      tools.forEach(t=>{
        const params=Object.entries(t.params).map(([k,v])=>{
          const req=t.required.includes(k);
          return`<div class="param-item"><span class="param-name">${k}</span><span class="param-type">${v.type}</span>${req?'<span class="param-required">*必填</span>':''}<span class="param-desc">${v.description||""}</span></div>`;
        }).join("");
        html+=`<div class="tool-card"><div class="tool-header"><span class="tool-name">${t.name}</span></div><div class="tool-desc">${t.desc}</div><div class="tool-params-title">参数说明</div><div class="param-list">${params||'<div style="color:#8b949e;font-size:0.82rem">无参数</div>'}</div></div>`;
      });
      html+="</div>";
    });
    document.getElementById("toolList").innerHTML=html||"<div class='loading'>暂无工具</div>";
  }catch(e){document.getElementById("toolList").innerHTML="<div class='loading'>加载失败</div>"}
}
document.addEventListener("DOMContentLoaded",loadTools);
</script>
</body>
</html>
